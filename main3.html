<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>main</title>
<!-- Swiper CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/8.4.7/swiper-bundle.min.css" />
<!-- AOS CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  overflow-x: hidden;
}
body::-webkit-scrollbar {
  display: none;
}
body {
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.text{
  font-size: 30px;
  text-align: center;
  margin-bottom: 30px;
  color: #333;
}
.swiper-container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 0;
}
.swiper-slide {
  display: flex;
  justify-content: center;
  align-items: center;
  background: white;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  padding: 0;
  overflow: hidden;
}
.box {
  text-align: center;
  width: 100%;
  height: 100%;
  position: relative;
}
.photo-container {
  width: 100%;
  height: 500px;
  margin: 0;
  border-radius: 0;
  overflow: hidden;
}
.photo-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin: auto;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 50px;
  transition: transform 0.3s;
}
.swiper-slide-active .circle {
  transform: scale(1.1);
}
.title {
  padding: 15px 10px;
  color: #fff;
  border-radius: 0;
  font-weight: bold;
  font-size: 18px;
  margin: 0;
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.7);
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.title:hover {
  transform: scale(1.02);
  box-shadow: 0 -3px 15px rgba(0,0,0,0.3);
}
.f1 {
  font-size: 50px;
}
/* Swiper 左右按鈕樣式 */
.swiper-button-next,
.swiper-button-prev {
  color: #333;
}
@keyframes pulse {
  0%, 100% {
    box-shadow: 0 3px 15px rgba(102, 126, 234, 0.5);
  }
  50% {
    box-shadow: 0 5px 25px rgba(102, 126, 234, 0.9);
  }
}
</style>
</head>
<body>
<p class="text">點擊色塊前往 YouTube</p>
<div id="app">
  <div class="swiper-container">
      <div class="swiper-wrapper">
          <div class="swiper-slide" v-for="(feature, index) in features" :key="index">
              <div class="box">
                  <div class="photo-container" v-if="feature.img">
                      <img :src="feature.img" :alt="feature.t">
                  </div>
                  <div class="circle" :style="{border: feature.b1}" v-else>
                      <div class="f1" :style="{color: feature.c}">{{feature.icon}}</div>
                  </div>
                  <div 
                    class="title" 
                    :style="{backgroundColor: feature.c}"
                    @click="openLink(feature.link)">
                      {{feature.t}}
                      <span>🎵</span>
                  </div>
              </div>
          </div>
      </div>
      <!-- 左右切換按鈕 -->
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
  </div>
</div>

<!-- Vue 3 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
<!-- Swiper JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/8.4.7/swiper-bundle.min.js"></script>
<!-- AOS JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      features: [
        { 
          t: 'high', 
          b1: '3px solid red', 
          c: 'red', 
          icon: '🎯', 
          img: 'default.img/s1.png',
          link: 'https://music.youtube.com/watch?v=lEbB3UGav58&si=v_cImOc0zfRZLrd7'
        },
        { 
          t: 'Until I Found You', 
          b1: '3px solid blue', 
          c: 'blue', 
          icon: '💡', 
          img: 'default.img/s2.png',
          link: 'https://music.youtube.com/watch?v=znvky0Uq8qc&si=SUJbTDCUu4yeybTr'
        },
        { 
          t: 'Be More', 
          b1: '3px solid green', 
          c: 'green', 
          icon: '🚀', 
          img: 'default.img/s3.png',
          link: 'https://music.youtube.com/watch?v=hGvl2rfJBU0&si=GlpVKP37hLSNvGeg'
        },
        { 
          t: 'Only Girl', 
          b1: '3px solid orange', 
          c: 'orange', 
          icon: '⭐', 
          img: 'default.img/s4.png',
          link: 'https://music.youtube.com/watch?v=wLGaRmIkVps&si=YpXvSBOJx6XpKVwI'
        },
        { 
          t: 'Evangeline', 
          b1: '3px solid purple', 
          c: 'purple', 
          icon: '🎨', 
          img: 'default.img/s5.png',
          link: 'https://music.youtube.com/watch?v=FwRRt-LpJoA&si=2rdD6YrAa468Qq8m'
        },
      ]
    };
  },
  methods: {
    openLink(url) {
      window.open(url, '_blank');
    }
  },
  mounted() {
    this.$nextTick(() => {
      const swiper = new Swiper('.swiper-container', {
        slidesPerView: 1,
        spaceBetween: 30,
        loop: true,
        autoplay: {
          delay: 3000,
          disableOnInteraction: false,
        },
        speed: 800,
        effect: 'slide',
        navigation: {
          nextEl: '.swiper-button-next',
          prevEl: '.swiper-button-prev',
        },
      });
    });
    
    AOS.init({
      duration: 1000,
      once: false
    });
  }
}).mount('#app');
</script>
</body>
</html>
